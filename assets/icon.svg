<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <clipPath id="bclip"><rect width="1024" height="1024" rx="232"/></clipPath>
    <linearGradient id="catbg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#efe9ff"/><stop offset="1" stop-color="#ffe6f3"/>
    </linearGradient>
    <radialGradient id="bg1" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ff86c9" stop-opacity="0.85"/><stop offset="1" stop-color="#ff86c9" stop-opacity="0"/></radialGradient>
    <radialGradient id="bg2" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#9b7bff" stop-opacity="0.8"/><stop offset="1" stop-color="#9b7bff" stop-opacity="0"/></radialGradient>
    <radialGradient id="bg3" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7ad7ff" stop-opacity="0.55"/><stop offset="1" stop-color="#7ad7ff" stop-opacity="0"/></radialGradient>
    <style>
      .blob { transform-box: fill-box; transform-origin: center; }
      .b1 { animation: liq1 11s ease-in-out infinite; }
      .b2 { animation: liq2 14s ease-in-out infinite; }
      .b3 { animation: liq3 9s ease-in-out infinite; }
      @keyframes liq1 { 0%,100% { transform: translate(0,0) scale(1); }   50% { transform: translate(150px,110px) scale(1.3); } }
      @keyframes liq2 { 0%,100% { transform: translate(0,0) scale(1.15); } 50% { transform: translate(-130px,80px) scale(0.85); } }
      @keyframes liq3 { 0%,100% { transform: translate(0,0) scale(1); }   50% { transform: translate(90px,-120px) scale(1.25); } }
      @media (prefers-reduced-motion: reduce) { .b1,.b2,.b3 { animation: none; } }
    </style>
  </defs>

  <!-- fundo líquido suave -->
  <g clip-path="url(#bclip)">
    <rect width="1024" height="1024" fill="url(#catbg)"/>
    <circle class="blob b1" cx="300" cy="340" r="330" fill="url(#bg1)"/>
    <circle class="blob b2" cx="760" cy="660" r="360" fill="url(#bg2)"/>
    <circle class="blob b3" cx="560" cy="240" r="280" fill="url(#bg3)"/>
  </g>

