<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Dash Animation Lab</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --txt:#e6edf3; --mut:#8b949e; --acc:#58a6ff; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; background:var(--bg); color:var(--txt);
    font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    display:grid; grid-template-columns:320px 1fr; gap:0;
  }
  aside {
    background:var(--panel); border-right:1px solid var(--line);
    padding:20px; display:flex; flex-direction:column; gap:18px; overflow-y:auto;
  }
  h1 { font-size:15px; margin:0 0 4px; letter-spacing:.02em; }
  .sub { color:var(--mut); font-size:12px; margin:0 0 8px; }
  .grp { display:flex; flex-direction:column; gap:6px; }
  .grp > label { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:.08em; }
  .row { display:flex; align-items:center; gap:8px; }
  .row output { margin-left:auto; color:var(--acc); font-variant-numeric:tabular-nums; }
  input[type=range] { width:100%; accent-color:var(--acc); }
  input[type=color] { width:34px; height:24px; padding:0; border:1px solid var(--line); background:none; border-radius:4px; }
  .modes { display:flex; gap:6px; }
  .modes button {
    flex:1; padding:8px; cursor:pointer; border:1px solid var(--line); border-radius:6px;
    background:var(--bg); color:var(--mut); font:inherit; transition:.15s;
  }
  .modes button.on { background:var(--acc); color:#0d1117; border-color:var(--acc); font-weight:600; }
  main { display:flex; align-items:center; justify-content:center; padding:32px; }
  .stage { width:100%; max-width:680px; }
  svg { width:100%; height:auto; display:block; }
  pre {
    margin:0; padding:12px; background:var(--bg); border:1px solid var(--line);
    border-radius:6px; font-size:11.5px; color:var(--mut); overflow-x:auto; white-space:pre;
  }
  pre b { color:var(--acc); font-weight:600; }
  .hint { color:var(--mut); font-size:11px; line-height:1.4; }
</style>
</head>
<body>
<aside>
  <div>
    <h1>SVG Dash Lab</h1>
    <p class="sub">stroke-dashoffset playground</p>
  </div>

  <div class="grp">
    <label>Mode</label>
    <div class="modes" id="modes">
      <button data-mode="march" class="on">Marching ants</button>
      <button data-mode="draw">Draw-on</button>
    </div>
    <p class="hint" id="modeHint"></p>
  </div>

  <div class="grp" id="dashGrp">
    <label>Dash pattern</label>
    <div class="row"><span>Dash</span><input type="range" id="dash" min="1" max="40" value="12"><output id="dashV">12</output></div>
    <div class="row"><span>Gap</span><input type="range" id="gap" min="1" max="40" value="8"><output id="gapV">8</output></div>
  </div>

  <div class="grp">
    <label>Animation</label>
    <div class="row"><span>Speed</span><input type="range" id="speed" min="0.2" max="6" step="0.1" value="1.6"><output id="speedV">1.6s</output></div>
    <div class="row"><span>Width</span><input type="range" id="width" min="1" max="20" value="6"><output id="widthV">6</output></div>
    <div class="row"><span>Reverse</span><input type="checkbox" id="rev"></div>
  </div>

  <div class="grp">
    <label>Color</label>
    <div class="row"><span>Stroke</span><input type="color" id="col" value="#58a6ff"></div>
  </div>

  <div class="grp">
    <label>Generated CSS</label>
    <pre id="code"></pre>
  </div>
</aside>

<main>
  <div class="stage">
    <svg id="svg" viewBox="0 0 400 260" fill="none">
      <path id="path" pathLength="100"
        d="M30 200 C 60 60, 120 60, 150 130 S 250 220, 290 130 S 360 40, 380 90"
        stroke-linecap="round"/>
    </svg>
  </div>
</main>

<style id="anim"></style>
<script>
const $ = id => document.getElementById(id);
const path = $('path'), anim = $('anim'), code = $('code');
let mode = 'march';

const hints = {
  march: 'dasharray = dash+gap. Offset animates one full cycle → seamless loop. pathLength=100 normalizes so speed is path-independent.',
  draw:  'dasharray = full length (100). Offset 100 → 0 reveals the line drawing itself. Dash/gap sliders disabled here.'
};

function render() {
  const dash = +$('dash').value, gap = +$('gap').value;
  const speed = +$('speed').value, width = +$('width').value;
  const rev = $('rev').checked, col = $('col').value;

  $('dashV').textContent = dash;
  $('gapV').textContent = gap;
  $('speedV').textContent = speed.toFixed(1) + 's';
  $('widthV').textContent = width;
  $('modeHint').textContent = hints[mode];
  $('dashGrp').style.opacity = mode === 'draw' ? .35 : 1;
  $('dashGrp').style.pointerEvents = mode === 'draw' ? 'none' : 'auto';

  path.setAttribute('stroke', col);
  path.setAttribute('stroke-width', width);

  let array, from, to, css;
  if (mode === 'march') {
    const cycle = dash + gap;
    array = `${dash} ${gap}`;
    from = 0;
    to = rev ? cycle : -cycle;   // negative = forward march
    css =
`#path {
  stroke-dasharray: <b>${dash} ${gap}</b>;   /* cycle = ${cycle} */
  animation: march ${speed}s linear infinite;
}
@keyframes march {
  from { stroke-dashoffset: 0; }
  to   { stroke-dashoffset: <b>${to}</b>; }  /* ±cycle = seamless */
}`;
  } else {
    array = `100`;               // pathLength normalized to 100
    from = rev ? 0 : 100;
    to   = rev ? 100 : 0;
    css =
`#path {
  pathLength: 100;               /* normalize */
  stroke-dasharray: <b>100</b>;  /* = full length */
  animation: draw ${speed}s ease-in-out infinite;
}
@keyframes draw {
  from { stroke-dashoffset: <b>${from}</b>; }
  to   { stroke-dashoffset: <b>${to}</b>; }
}`;
  }

  path.style.strokeDasharray = array;
  anim.textContent =
    `@keyframes _run { from { stroke-dashoffset:${from}; } to { stroke-dashoffset:${to}; } }
     #path { animation:_run ${speed}s ${mode==='march'?'linear':'ease-in-out'} infinite; }`;
  code.innerHTML = css;
}

$('modes').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  mode = b.dataset.mode;
  [...$('modes').children].forEach(x => x.classList.toggle('on', x === b));
  render();
});
['dash','gap','speed','width','rev','col'].forEach(id => $(id).addEventListener('input', render));
render();
</script>
</body>
</html>
