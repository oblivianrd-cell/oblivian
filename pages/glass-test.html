<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Glass — teste (feDisplacementMap)</title>
<style>
  :root { --ui:#0e0f15; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    min-height:100%; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; color:#fff;
    /* cena de fundo viva — pra ver a refração do vidro */
    background:
      radial-gradient(60% 60% at 20% 20%, #ff7eb3 0%, transparent 60%),
      radial-gradient(55% 55% at 85% 25%, #7afcff 0%, transparent 55%),
      radial-gradient(60% 60% at 70% 85%, #feff9c 0%, transparent 55%),
      radial-gradient(50% 50% at 25% 80%, #a18cff 0%, transparent 55%),
      linear-gradient(135deg,#1b1030,#0b0f1f);
    overflow:hidden;
  }
  .bgtext {
    position:fixed; inset:0; display:grid; place-items:center; pointer-events:none;
    font-weight:900; letter-spacing:-.04em; line-height:.9; text-align:center;
    font-size:clamp(60px,16vw,220px); color:rgba(255,255,255,.16);
    text-transform:uppercase;
  }
  .bgemoji { position:fixed; font-size:90px; opacity:.9; }
  .e1{top:12%;left:8%}.e2{top:70%;left:14%}.e3{top:18%;right:10%}.e4{bottom:12%;right:16%}.e5{top:46%;left:46%}

  /* ===== o cartão de vidro ===== */
  .glass {
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
    width:340px; height:230px; border-radius:32px;
    display:grid; place-items:center; text-align:center; padding:24px;
    cursor:grab; user-select:none; touch-action:none;
    /* a refração: filtro SVG no backdrop */
    -webkit-backdrop-filter:url(#glassFilter); backdrop-filter:url(#glassFilter);
    /* realce de borda + glow (camadas extras) */
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,var(--edge,.25)),
      inset 2px 3px 6px rgba(255,255,255,calc(var(--edge,.25) * .9)),
      inset -2px -3px 8px rgba(0,0,0,.18),
      0 18px 50px rgba(0,0,0,calc(var(--glow,.10) + .15)),
      0 0 40px rgba(150,180,255,var(--glow,.10));
    background:linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  }
  .glass:active { cursor:grabbing; }
  /* brilho especular (faixa de luz no ângulo) */
  .glass::before {
    content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background:linear-gradient(var(--spec,45deg), rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 22%, rgba(255,255,255,0) 78%, rgba(255,255,255,.18) 100%);
    mix-blend-mode:screen; opacity:.9;
  }
  /* fringe de cor (chroma) na borda */
  .glass::after {
    content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    padding:1.5px;
    background:conic-gradient(from 0deg, #ff5d8f,#5dd0ff,#9c7bff,#ffd166,#ff5d8f);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    opacity:var(--chroma,.20);
  }
  .glass h3 { font-size:22px; font-weight:800; letter-spacing:-.02em; text-shadow:0 1px 8px rgba(0,0,0,.3); }
  .glass p  { font-size:14px; opacity:.92; margin-top:6px; text-shadow:0 1px 6px rgba(0,0,0,.3); }

  /* ===== painel de controles ===== */
  .panel {
    position:fixed; top:14px; left:14px; z-index:50; width:270px; max-height:94vh; overflow:auto;
    background:rgba(12,14,22,.72); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:14px 16px;
    font-size:13px;
  }
  .panel h1 { font-size:14px; margin-bottom:10px; letter-spacing:.02em; }
  .row { margin:9px 0; }
  .row label { display:flex; justify-content:space-between; gap:8px; margin-bottom:3px; color:#cfd3e0; }
  .row label b { color:#8ab4ff; font-variant-numeric:tabular-nums; }
  .row input[type=range]{ width:100%; accent-color:#7c5cff; }
  .panel .hint { color:#7d8295; font-size:11px; margin-top:8px; line-height:1.4; }
  .panel button { margin-top:8px; width:100%; padding:8px; border:none; border-radius:9px; background:#7c5cff; color:#fff; font-weight:700; cursor:pointer; }
</style>
</head>
<body>
  <div class="bgtext">Oblivian</div>
  <div class="bgemoji e1">🐱</div><div class="bgemoji e2">🎮</div><div class="bgemoji e3">🎨</div><div class="bgemoji e4">🔥</div><div class="bgemoji e5">💬</div>

  <!-- filtro SVG: desfoca o backdrop e desloca pelos canais R/G do mapa -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="glassFilter" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="1.5" result="sat"/>
      <feImage id="dispImg" result="map" preserveAspectRatio="none"/>
      <feDisplacementMap id="disp" in="sat" in2="map" scale="60" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <div class="glass" id="glass">
    <div>
      <h3>Vidro líquido</h3>
      <p>Arraste-me sobre o fundo</p>
    </div>
  </div>

  <div class="panel">
    <h1>🔧 Glass — config</h1>
    <div class="row"><label>Largura <b id="vW">340</b></label><input id="cW" type="range" min="160" max="560" value="340"></div>
    <div class="row"><label>Altura <b id="vH">230</b></label><input id="cH" type="range" min="120" max="460" value="230"></div>
    <div class="row"><label>Raio <b id="vR">32</b></label><input id="cR" type="range" min="0" max="120" value="32"></div>
    <div class="row"><label>Scale (refração) <b id="vS">60</b></label><input id="cS" type="range" min="0" max="200" value="60"></div>
    <div class="row"><label>Depth (banda da borda) <b id="vD">28</b></label><input id="cD" type="range" min="4" max="90" value="28"></div>
    <div class="row"><label>Curvatura <b id="vC">2.2</b></label><input id="cC" type="range" min="0.4" max="6" step="0.1" value="2.2"></div>
    <div class="row"><label>Blur <b id="vB">2</b></label><input id="cB" type="range" min="0" max="20" step="0.5" value="2"></div>
    <div class="row"><label>Saturação <b id="vSat">1.5</b></label><input id="cSat" type="range" min="1" max="3" step="0.1" value="1.5"></div>
    <div class="row"><label>Chroma (fringe) <b id="vCh">0.20</b></label><input id="cCh" type="range" min="0" max="1" step="0.05" value="0.20"></div>
    <div class="row"><label>Glow <b id="vG">0.10</b></label><input id="cG" type="range" min="0" max="1" step="0.05" value="0.10"></div>
    <div class="row"><label>Edge highlight <b id="vE">0.25</b></label><input id="cE" type="range" min="0" max="1" step="0.05" value="0.25"></div>
    <div class="row"><label>Ângulo especular <b id="vA">45</b></label><input id="cA" type="range" min="0" max="360" value="45"></div>
    <button id="copy">Copiar config (JSON)</button>
    <div class="hint">Mapa de deslocamento gerado em canvas (quadrante espelhado). Chrome/Edge. Safari precisa de id novo por frame.</div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const glass = $('glass'), dispImg = $('dispImg'), disp = $('disp');
  const blurNode = document.querySelector('#glassFilter feGaussianBlur');
  const satNode  = document.querySelector('#glassFilter feColorMatrix');
  const cv = document.createElement('canvas');
  const ctx = cv.getContext('2d');

  const cfg = { W:340,H:230,R:32,S:60,D:28,C:2.2,B:2,Sat:1.5,Ch:0.20,G:0.10,E:0.25,A:45 };

  // SDF de retângulo arredondado (negativo dentro). Retorna distância COM SINAL.
  function sdRoundRect(px, py, hw, hh, r){
    const qx = Math.abs(px) - (hw - r);
    const qy = Math.abs(py) - (hh - r);
    const ax = Math.max(qx,0), ay = Math.max(qy,0);
    return Math.min(Math.max(qx,qy),0) + Math.hypot(ax,ay) - r;
  }

  // gera o mapa: R = desloc. horizontal, G = vertical. Centro neutro (128).
  function buildMap(){
    const W = Math.round(cfg.W), H = Math.round(cfg.H);
    const r = Math.min(cfg.R, Math.min(W,H)/2);
    const depth = cfg.D, curv = cfg.C;
    cv.width = W; cv.height = H;
    const img = ctx.createImageData(W,H);
    const d = img.data;
    const hw = W/2, hh = H/2;
    const eps = 1;
    for (let y=0; y<H; y++){
      for (let x=0; x<W; x++){
        const px = x - hw + 0.5, py = y - hh + 0.5;
        const sd = sdRoundRect(px,py,hw,hh,r);          // <0 dentro
        let R=128, G=128;
        const inside = -sd;                              // distância pra dentro a partir da borda
        if (sd < 0 && inside < depth){
          // normal (gradiente do SDF) — aponta pra fora
          const gx = (sdRoundRect(px+eps,py,hw,hh,r) - sdRoundRect(px-eps,py,hw,hh,r))/(2*eps);
          const gy = (sdRoundRect(px,py+eps,hw,hh,r) - sdRoundRect(px,py-eps,hw,hh,r))/(2*eps);
          const len = Math.hypot(gx,gy) || 1;
          const nx = gx/len, ny = gy/len;               // normal pra fora
          const t = 1 - (inside/depth);                 // 1 na borda -> 0 fundo
          const profile = Math.pow(Math.max(t,0), curv);// rampa de curvatura
          // empurra a amostra pra fora (magnifica) — 127 = alcance máx do canal
          R = 128 + nx * profile * 127;
          G = 128 + ny * profile * 127;
        }
        const i = (y*W + x)*4;
        d[i]   = Math.max(0,Math.min(255,R));
        d[i+1] = Math.max(0,Math.min(255,G));
        d[i+2] = 128;
        d[i+3] = 255;
      }
    }
    ctx.putImageData(img,0,0);
    return cv.toDataURL();
  }

  function apply(){
    // tamanho do cartão
    glass.style.width = cfg.W+'px';
    glass.style.height = cfg.H+'px';
    glass.style.borderRadius = cfg.R+'px';
    glass.style.setProperty('--edge', cfg.E);
    glass.style.setProperty('--glow', cfg.G);
    glass.style.setProperty('--chroma', cfg.Ch);
    glass.style.setProperty('--spec', cfg.A+'deg');
    // filtro
    blurNode.setAttribute('stdDeviation', cfg.B);
    satNode.setAttribute('values', cfg.Sat);
    disp.setAttribute('scale', cfg.S);
    const url = buildMap();
    dispImg.setAttribute('href', url);
    dispImg.setAttribute('width', cfg.W);
    dispImg.setAttribute('height', cfg.H);
    // labels
    $('vW').textContent=cfg.W; $('vH').textContent=cfg.H; $('vR').textContent=cfg.R;
    $('vS').textContent=cfg.S; $('vD').textContent=cfg.D; $('vC').textContent=cfg.C;
    $('vB').textContent=cfg.B; $('vSat').textContent=cfg.Sat; $('vCh').textContent=(+cfg.Ch).toFixed(2);
    $('vG').textContent=(+cfg.G).toFixed(2); $('vE').textContent=(+cfg.E).toFixed(2); $('vA').textContent=cfg.A;
  }

  const bind = (id,key,num=true)=>{ $(id).addEventListener('input',e=>{ cfg[key]= num? +e.target.value : e.target.value; apply(); }); };
  bind('cW','W');bind('cH','H');bind('cR','R');bind('cS','S');bind('cD','D');bind('cC','C');
  bind('cB','B');bind('cSat','Sat');bind('cCh','Ch');bind('cG','G');bind('cE','E');bind('cA','A');
  $('copy').addEventListener('click',()=>{ navigator.clipboard?.writeText(JSON.stringify(cfg,null,2)); $('copy').textContent='Copiado!'; setTimeout(()=>$('copy').textContent='Copiar config (JSON)',1200); });

  // arrastar o cartão
  let drag=false, ox=0, oy=0, cx=innerWidth/2, cy=innerHeight/2;
  function place(){ glass.style.left=cx+'px'; glass.style.top=cy+'px'; }
  glass.addEventListener('pointerdown',e=>{ drag=true; ox=e.clientX-cx; oy=e.clientY-cy; glass.setPointerCapture(e.pointerId); });
  glass.addEventListener('pointermove',e=>{ if(!drag)return; cx=e.clientX-ox; cy=e.clientY-oy; place(); });
  glass.addEventListener('pointerup',()=>drag=false);
  place(); apply();
</script>
</body>
</html>
